listen: ":8880"
listen_mode: plain       # "plain" or "tailscale"
append_only: false
log_level: info
shutdown_timeout: 30     # graceful shutdown timeout in seconds

tailscale:
  hostname: restic-server
  state_dir: ./ts-state
  auth_key: ""            # TS_AUTHKEY or set via RESTIC_TAILSCALE_AUTH_KEY

metrics:
  enabled: true
  password: ""              # if set, /-/metrics requires Basic Auth (user: prometheus)

stats:
  enabled: false             # enable per-repository traffic statistics (SQLite)
  db_path: ./stats.db        # path to SQLite database file

# Environment variable substitution: use ${VAR_NAME} in any string value.
# By default, missing variables cause a startup error.
# Use --env-lenient to allow unresolved placeholders.

storage:
  backend: filesystem     # "filesystem", "s3", "memory"
  path: ./restic_data
  max_memory_bytes: 104857600  # 100MB for memory backend
  data_sharding: true          # split data/ into 256 subdirs (00-ff); applies to filesystem and webdav
  s3:
    bucket: my-bucket
    prefix: ""
    region: eu-central-1
    endpoint: ""                       # custom S3 endpoint (e.g. MinIO)
    access_key: ""                     # leave empty to use AWS default credential chain
    secret_key: ""
    # access_key: ${AWS_ACCESS_KEY_ID}       # env var example
    # secret_key: ${AWS_SECRET_ACCESS_KEY}   # env var example
  webdav:
    endpoint: ""          # WebDAV server URL (e.g. https://cloud.example.com/remote.php/dav/files/user)
    username: ""
    password: ""
    prefix: ""            # optional path prefix within the WebDAV server
  rclone:
    endpoint: ""          # rclone serve restic URL (e.g. http://localhost:8080)
    username: ""          # optional basic auth username
    password: ""          # optional basic auth password
  smb:
    server: ""            # SMB server hostname or IP (e.g. nas.local)
    share: ""             # share name (e.g. backups)
    username: ""          # SMB username
    password: ""          # SMB password (supports ${SMB_PASSWORD} env var substitution)
    domain: WORKGROUP     # SMB domain (default: WORKGROUP)
    port: 445             # SMB port (default: 445)
    base_path: ""         # optional subdirectory within the share

# Optional: load ACL rules from a separate file.
# Cannot be used together with inline acl: section.
# acl_file: /etc/ts-restic-server/acl.yaml

# ACL — fine-grained access control per identity and repo path.
# Omit this section entirely to disable ACL (all requests are allowed).
# acl:
#   default_role: read-only       # deny, read-only, append-only, full-access
#   dns_server: ""                # custom DNS for rDNS lookups (plain mode; Tailscale uses 100.100.100.100 automatically)
#   rdns_cache_ttl: 600           # rDNS cache TTL in seconds (default: 600)
#   identity_cache_size: 1000    # max identity cache entries (default: 1000)
#   trusted_proxies:              # CIDRs of trusted reverse proxies for X-Forwarded-For
#     - 10.0.0.0/8               # if omitted, Echo defaults are used (loopback + link-local + private nets)
#     - 172.16.0.0/12
#   rules:
#     - paths: ["/server-a"]
#       identities: ["server-a"]              # short hostname (Tailscale only)
#       permission: full-access
#     - paths: ["/team-backup"]
#       identities: ["server.zuul-vibes.ts.net"]  # FQDN (Tailscale)
#       permission: full-access
#     - paths: ["/office"]
#       identities: ["nas.home.arpa"]          # rDNS hostname (plain mode)
#       permission: append-only
#     - paths: ["/server-b"]
#       identities: ["100.64.0.5"]             # IP (both modes)
#       permission: full-access
#     - paths: ["/tagged-servers"]
#       identities: ["tag:server"]               # Tailscale tag (requires WhoIs)
#       permission: full-access
#     - paths: ["/alice-backup"]
#       identities: ["alice@example.com"]         # Tailscale user login (requires WhoIs)
#       permission: full-access
#     - paths: ["/private"]
#       identities: ["*"]
#       permission: deny          # deny overrides any other rule at the same path depth
